<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Virtual Casino</title>
    <style>
        /* Базовые стили и цветовая палитра */
        :root {
            --primary: #00ffcc;
            --primary-hover: #00e6b8;
            --bg: #0d0e15;
            --card-bg: #1a1c29;
            --text: #e0e6ed;
            --danger: #ff3366;
            --success: #33ff99;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Шапка и баланс */
        header {
            margin-top: 40px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            margin-bottom: 10px;
        }

        .balance-board {
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            font-size: 1.5rem;
            display: inline-block;
        }

        .balance-amount {
            color: var(--primary);
            font-weight: bold;
            transition: color 0.3s;
        }

        /* Сетка игр */
        .games-container {
            display: flex;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .game-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border-top: 3px solid var(--primary);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.2);
        }

        h2 {
            color: #fff;
            margin-top: 0;
            font-weight: 600;
        }

        /* Элементы управления */
        input[type="number"], select {
            width: 80%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            width: 80%;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            background: transparent;
            box-shadow: none;
        }

        .result-text {
            margin-top: 20px;
            min-height: 24px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Анимации */
        @keyframes pulseWin {
            0% { transform: scale(1); color: var(--success); text-shadow: 0 0 10px var(--success); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); color: var(--success); text-shadow: none; }
        }

        @keyframes pulseLose {
            0% { transform: scale(1); color: var(--danger); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); color: var(--danger); }
        }

        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(720deg); }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            50% { transform: translateX(5px) rotate(5deg); }
            75% { transform: translateX(-5px) rotate(-5deg); }
            100% { transform: translateX(0); }
        }

        .win { animation: pulseWin 0.6s ease forwards; }
        .lose { animation: pulseLose 0.6s ease forwards; }
        .spinning { display: inline-block; animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .shaking { display: inline-block; animation: shake 0.5s ease-in-out infinite; }
    </style>
</head>
<body>

    <header>
        <h1>Neon Casino</h1>
        <div class="balance-board">
            Баланс: <span class="balance-amount" id="balanceDisplay">1000</span> 🪙
        </div>
    </header>

    <main class="games-container">
        
        <div class="game-card">
            <h2>🎲 Кости против Бота</h2>
            <p>У кого выпадет больше, тот забирает всё!</p>
            <input type="number" id="diceBet" placeholder="Сумма ставки" min="1" value="50">
            <button id="btnDice" onclick="playDice()">Бросить кости</button>
            <div class="result-text" id="diceResult"></div>
        </div>

        <div class="game-card">
            <h2>🪙 Орёл или Решка</h2>
            <p>Угадай сторону монеты и удвой ставку.</p>
            <select id="coinChoice">
                <option value="heads">Орёл</option>
                <option value="tails">Решка</option>
            </select>
            <input type="number" id="coinBet" placeholder="Сумма ставки" min="1" value="50">
            <button id="btnCoin" onclick="playCoin()">Подбросить</button>
            <div class="result-text" id="coinResult"></div>
        </div>

    </main>

    <script>
        // Инициализация баланса
        let balance = 1000;
        const balanceDisplay = document.getElementById('balanceDisplay');

        // Функция обновления баланса с легкой анимацией
        function updateBalance(amount) {
            balance += amount;
            balanceDisplay.innerText = balance;
            balanceDisplay.style.color = amount > 0 ? 'var(--success)' : (amount < 0 ? 'var(--danger)' : 'var(--primary)');
            setTimeout(() => {
                balanceDisplay.style.color = 'var(--primary)';
            }, 500);
        }

        // Проверка корректности ставки
        function validateBet(betAmount) {
            if (isNaN(betAmount) || betAmount <= 0) {
                return "Ставка должна быть больше нуля!";
            }
            if (betAmount > balance) {
                return "Недостаточно средств на балансе!";
            }
            return null;
        }

        // Логика игры "Кости"
        function playDice() {
            const betInput = document.getElementById('diceBet');
            const resultDiv = document.getElementById('diceResult');
            const btn = document.getElementById('btnDice');
            const bet = parseInt(betInput.value);

            const error = validateBet(bet);
            if (error) {
                resultDiv.className = 'result-text lose';
                resultDiv.innerText = error;
                return;
            }

            // Блокируем кнопку и показываем анимацию
            btn.disabled = true;
            resultDiv.className = 'result-text shaking';
            resultDiv.innerText = "🎲 Бросаем кости...";

            setTimeout(() => {
                const playerRoll = Math.floor(Math.random() * 6) + 1;
                const botRoll = Math.floor(Math.random() * 6) + 1;

                resultDiv.className = 'result-text';
                
                if (playerRoll > botRoll) {
                    updateBalance(bet);
                    resultDiv.innerHTML = `Ты: ${playerRoll} | Бот: ${botRoll}<br>Ты выиграл ${bet} 🪙!`;
                    resultDiv.classList.add('win');
                } else if (playerRoll < botRoll) {
                    updateBalance(-bet);
                    resultDiv.innerHTML = `Ты: ${playerRoll} | Бот: ${botRoll}<br>Ты проиграл ${bet} 🪙.`;
                    resultDiv.classList.add('lose');
                } else {
                    resultDiv.innerHTML = `Ты: ${playerRoll} | Бот: ${botRoll}<br>Ничья! Ставка возвращена.`;
                    resultDiv.style.color = 'var(--text)';
                }
                btn.disabled = false;
            }, 1000);
        }

        // Логика игры "Орел или Решка"
        function playCoin() {
            const betInput = document.getElementById('coinBet');
            const choiceInput = document.getElementById('coinChoice');
            const resultDiv = document.getElementById('coinResult');
            const btn = document.getElementById('btnCoin');
            const bet = parseInt(betInput.value);
            const choice = choiceInput.value;

            const error = validateBet(bet);
            if (error) {
                resultDiv.className = 'result-text lose';
                resultDiv.innerText = error;
                return;
            }

            // Блокируем кнопку и показываем анимацию вращения
            btn.disabled = true;
            resultDiv.className = 'result-text spinning';
            resultDiv.innerText = "🪙 Монета летит...";

            setTimeout(() => {
                const isHeads = Math.random() >= 0.5;
                const coinResult = isHeads ? 'heads' : 'tails';
                const coinName = isHeads ? 'Орёл' : 'Решка';

                resultDiv.className = 'result-text';

                if (choice === coinResult) {
                    updateBalance(bet);
                    resultDiv.innerHTML = `Выпал(а) ${coinName}.<br>Ты выиграл ${bet} 🪙!`;
                    resultDiv.classList.add('win');
                } else {
                    updateBalance(-bet);
                    resultDiv.innerHTML = `Выпал(а) ${coinName}.<br>Ты проиграл ${bet} 🪙.`;
                    resultDiv.classList.add('lose');
                }
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
