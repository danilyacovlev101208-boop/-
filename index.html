<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню Бота</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--tg-theme-bg-color, #fff0f5);
            color: var(--tg-theme-text-color, #4a0e2e);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        .btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 15px 10px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.4);
        }
        .btn.full-width { grid-column: span 2; }
        .btn:active { background-color: #ff1493; transform: scale(0.95); }
        .emoji { font-size: 28px; }
    </style>
</head>
<body>

    

    <div class="menu-grid">
        <button class="btn full-width" onclick="sendCmd('main_add_number')">
            <span class="emoji">📱</span> Добавить номер
        </button>
        <button class="btn" onclick="sendCmd('main_my_numbers')">
            <span class="emoji">📋</span> Мои номера
        </button>
        <button class="btn" onclick="sendCmd('main_stats')">
            <span class="emoji">📊</span> Статистика
        </button>
        <button class="btn" onclick="sendCmd('main_withdraw')">
            <span class="emoji">💸</span> Вывод
        </button>
        <button class="btn" onclick="sendCmd('main_open_service_menu')">
            <span class="emoji">⚙️</span> Сервис
        </button>
        <button class="btn full-width" onclick="sendCmd('main_settings')">
            <span class="emoji">🛠</span> Настройки
        </button>
        <button class="btn full-width" onclick="sendCmd('main_help')">
            <span class="emoji">🆘</span> Помощь
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function sendCmd(command) {
            tg.sendData(command);
            tg.close();
        }
    </script>
</body>
</html>
