<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild West Saloon</title>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood-dark: #3e2723; --wood-med: #5d4037; --wood-light: #8d6e63;
            --paper: #f4e4bc; --text-dark: #2c1a11; --gold: #ffb300;
        }
        body {
            font-family: 'PT Sans', sans-serif;
            background: repeating-linear-gradient(to right, #4e342e, #4e342e 80px, #3e2723 80px, #3e2723 82px);
            color: var(--paper); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        h1, h2, .saloon-font { font-family: 'Rye', cursive; font-weight: normal; margin: 10px 0; }
        
        header {
            margin-top: 20px; text-align: center;
            background: #5d4037; padding: 20px 50px; border: 4px solid #2c1a11;
            border-radius: 10px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.7);
        }
        h1 { color: var(--gold); font-size: 2.5rem; text-shadow: 2px 2px 0 #000; margin: 0; }
        .balance-board {
            background: var(--paper); color: var(--text-dark); padding: 5px 15px;
            border: 2px dashed #8d6e63; font-size: 1.5rem; font-weight: bold; margin-top: 10px; display: inline-block;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 900px; margin-top: 20px; }
        .screen.active { display: flex; }

        .menu-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .menu-card {
            background: var(--paper); color: var(--text-dark); width: 220px; padding: 15px;
            text-align: center; border: 4px solid var(--wood-dark); border-radius: 10px; cursor: pointer;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6); transition: transform 0.2s; position: relative;
        }
        .menu-card:hover { transform: scale(1.05) rotate(2deg); background: #fff3e0; }
        .menu-icon { font-size: 3rem; margin: 5px 0; }

        .controls {
            background: var(--paper); padding: 20px; border-radius: 10px; border: 3px solid var(--wood-dark);
            text-align: center; color: var(--text-dark); box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
        }
        input, select {
            font-size: 1.1rem; padding: 8px; border: 2px solid var(--wood-dark); border-radius: 5px;
            width: 120px; margin: 10px; text-align: center;
        }
        button.btn-wood {
            background: var(--wood-med); color: var(--paper); font-family: 'Rye', cursive; font-size: 1.1rem;
            padding: 10px 20px; border: 3px solid var(--wood-dark); border-radius: 8px; cursor: pointer;
            transition: all 0.1s;
        }
        button.btn-wood:hover:not(:disabled) { background: var(--wood-light); transform: translateY(-2px); }
        button.btn-wood:disabled { filter: grayscale(100%); cursor: not-allowed; opacity: 0.7; }
        .back-btn { margin-bottom: 20px; background: transparent !important; border-color: var(--paper) !important; }

        .result-box { font-size: 1.3rem; margin-top: 15px; font-weight: bold; min-height: 40px; }
        .win { color: #2e7d32; } .lose { color: #c62828; }

        /* Карточный стол */
        .board {
            background: #2e7d32; border: 10px solid var(--wood-dark); border-radius: 15px;
            width: 100%; max-width: 800px; padding: 20px; box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            display: none; flex-direction: column; gap: 15px; position: relative;
        }
        .hand { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; min-height: 110px; }
        .card {
            width: 70px; height: 100px; background: white; border: 1px solid #999; border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: space-between;
            padding: 5px; font-weight: bold; font-size: 1.1rem; transition: transform 0.2s; position: relative; cursor: pointer;
        }
        .card.red { color: #d32f2f; } .card.black { color: #212121; }
        .card.hidden { background: repeating-linear-gradient(45deg, #d32f2f, #d32f2f 10px, white 10px, white 20px); color: transparent; cursor: default; }
        .hand.player .card:hover { transform: translateY(-10px); }
        .table-area { display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 120px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .deck-area { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; }
        .trump-card { transform: rotate(90deg) translateX(20px); z-index: 1; }
        .deck-stack { z-index: 2; position: absolute; left: 10px; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }
        .anim-shake { animation: shake 0.4s ease infinite; }
    </style>
</head>
<body>

    <header>
        <h1>Wild West Saloon</h1>
        <div class="balance-board">Золото: <span id="balance" style="color: #d32f2f;">1000</span> $</div>
    </header>

    <div id="menu" class="screen active">
        <h2 class="saloon-font">Выбери игру:</h2>
        <div class="menu-grid">
            <div class="menu-card" onclick="nav('dice')"><div class="menu-icon">🎲</div><h2>Кости</h2></div>
            <div class="menu-card" onclick="nav('coin')"><div class="menu-icon">🪙</div><h2>Монетка</h2></div>
            <div class="menu-card" onclick="nav('cards')"><div class="menu-icon">🃏</div><h2>Дурак</h2></div>
        </div>
    </div>

    <div id="dice" class="screen">
        <button class="btn-wood back-btn" onclick="nav('menu')">← В салун</button>
        <div class="controls">
            <h2>🎲 Кости</h2>
            <input type="number" id="diceBet" value="50" min="10">
            <br><button class="btn-wood" id="btnDice" onclick="playDice()">Бросить</button>
            <div class="result-box" id="diceRes"></div>
        </div>
    </div>

    <div id="coin" class="screen">
        <button class="btn-wood back-btn" onclick="nav('menu')">← В салун</button>
        <div class="controls">
            <h2>🪙 Монетка</h2>
            <select id="coinPick"><option value="heads">Орёл</option><option value="tails">Решка</option></select>
            <input type="number" id="coinBet" value="50" min="10">
            <br><button class="btn-wood" id="btnCoin" onclick="playCoin()">Бросить</button>
            <div class="result-box" id="coinRes"></div>
        </div>
    </div>

    <div id="cards" class="screen">
        <button class="btn-wood back-btn" onclick="endCards()">← В салун</button>
        
        <div class="controls" id="cardsSetup">
            <h2>🃏 Дуэль в Дурака</h2>
            <p>Упрощенный 1 на 1. Ходим по 1 карте. Банк достанется победителю.</p>
            <input type="number" id="cardsBet" value="100" min="10">
            <br><button class="btn-wood" onclick="startCards()">Сдать карты</button>
            <div class="result-box" id="cardsRes"></div>
        </div>

        <div class="board" id="board">
            <div style="text-align:center; color:white; font-weight:bold; font-size:1.2rem;" id="gameStatus"></div>
            <div class="hand" id="botHand"></div>
            <div class="table-area">
                <div class="deck-area" id="deckArea"></div>
                <div id="tableAttack"></div>
                <div id="tableDefend"></div>
            </div>
            <div style="text-align: center; height: 40px;">
                <button class="btn-wood" id="btnTake" style="display:none;" onclick="playerTake()">Взять карты</button>
            </div>
            <div class="hand player" id="playerHand"></div>
        </div>
    </div>

    <script>
        let bal = 1000;
        const uiBal = document.getElementById('balance');
        
        function updateBal(amt) { bal += amt; uiBal.innerText = bal; }
        function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function checkBet(b) { if(isNaN(b) || b<=0) return "Ставка неверна!"; if(b>bal) return "Мало золота!"; return null; }

        // --- МИНИ-ИГРЫ (Кости и Монетка) ---
        function playDice() {
            let b = parseInt(document.getElementById('diceBet').value), res = document.getElementById('diceRes'), btn = document.getElementById('btnDice');
            let err = checkBet(b); if(err){ res.innerHTML=`<span class='lose'>${err}</span>`; return; }
            btn.disabled = true; res.className = 'result-box anim-shake'; res.innerText = "Гремят кости...";
            setTimeout(() => {
                let p = Math.floor(Math.random()*6)+1, c = Math.floor(Math.random()*6)+1;
                res.className = 'result-box';
                if(p>c) { updateBal(b); res.innerHTML=`Ты: ${p} | Бармен: ${c}<br><span class='win'>+${b}$</span>`; }
                else if(p<c) { updateBal(-b); res.innerHTML=`Ты: ${p} | Бармен: ${c}<br><span class='lose'>-${b}$</span>`; }
                else { res.innerHTML=`Ты: ${p} | Бармен: ${c}<br>Ничья!`; }
                btn.disabled = false;
            }, 600);
        }

        function playCoin() {
            let b = parseInt(document.getElementById('coinBet').value), choice = document.getElementById('coinPick').value;
            let res = document.getElementById('coinRes'), btn = document.getElementById('btnCoin');
            let err = checkBet(b); if(err){ res.innerHTML=`<span class='lose'>${err}</span>`; return; }
            btn.disabled = true; res.className = 'result-box anim-shake'; res.innerText = "Звенит монета...";
            setTimeout(() => {
                let isH = Math.random()>=0.5; let result = isH ? 'heads' : 'tails'; let name = isH ? 'Орёл' : 'Решка';
                res.className = 'result-box';
                if(choice === result) { updateBal(b); res.innerHTML=`Выпал ${name}!<br><span class='win'>+${b}$</span>`; }
                else { updateBal(-b); res.innerHTML=`Выпал ${name}.<br><span class='lose'>-${b}$</span>`; }
                btn.disabled = false;
            }, 600);
        }

        // --- ДУРАК ---
        const suits = ['♠','♥','♦','♣'], vals = [6,7,8,9,10,11,12,13,14], vNames = {11:'J',12:'Q',13:'K',14:'A'};
        let deck = [], pHand = [], bHand = [], trump = null, tAtt = null, tDef = null;
        let isPTurn = true, phase = 'idle', curBet = 0;

        function endCards() { nav('menu'); document.getElementById('cardsSetup').style.display = 'block'; document.getElementById('board').style.display = 'none'; }
        
        function makeCardHTML(c, hidden=false, onclick='') {
            if(!c) return '';
            if(hidden) return `<div class="card hidden"></div>`;
            return `<div class="card ${c.color}" ${onclick}>
                <div>${c.n}${c.s}</div><div style="font-size:2rem; align-self:center;">${c.s}</div><div style="align-self:flex-end; transform:rotate(180deg);">${c.n}${c.s}</div>
            </div>`;
        }

        function renderCards() {
            document.getElementById('botHand').innerHTML = bHand.map(c => makeCardHTML(c, true)).join('');
            
            let dHTML = '';
            if(deck.length>0) dHTML = `<div class="trump-card">${makeCardHTML(trump)}</div><div class="card hidden deck-stack"><div style="background:white; color:black; padding:2px; font-size:14px; position:absolute; top:35%; left:30%; border-radius:3px;">${deck.length}</div></div>`;
            else if(trump && deck.length===0) dHTML = `<div style="opacity:0.5">${makeCardHTML(trump)}</div>`;
            document.getElementById('deckArea').innerHTML = dHTML;

            document.getElementById('tableAttack').innerHTML = makeCardHTML(tAtt);
            document.getElementById('tableDefend').innerHTML = makeCardHTML(tDef);

            document.getElementById('playerHand').innerHTML = pHand.map((c,i) => makeCardHTML(c, false, phase==='p_att'||phase==='p_def' ? `onclick="playCard(${i})"` : '')).join('');
            document.getElementById('btnTake').style.display = (phase==='p_def' && tAtt) ? 'inline-block' : 'none';
        }

        function updateState(msg) { document.getElementById('gameStatus').innerText = msg; renderCards(); checkWin(); }

        function startCards() {
            let b = parseInt(document.getElementById('cardsBet').value), res = document.getElementById('cardsRes');
            let err = checkBet(b); if(err){ res.innerHTML=`<span class='lose'>${err}</span>`; return; }
            updateBal(-b); curBet = b;
            
            document.getElementById('cardsSetup').style.display = 'none'; document.getElementById('board').style.display = 'flex';
            
            deck = []; pHand = []; bHand = []; tAtt = null; tDef = null;
            suits.forEach(s => vals.forEach(v => deck.push({s, v, n: vNames[v]||v, color: (s==='♥'||s==='♦')?'red':'black'})));
            deck.sort(() => Math.random() - 0.5); // Простая тасовка
            
            for(let i=0; i<6; i++) { pHand.push(deck.pop()); bHand.push(deck.pop()); }
            trump = deck[0];
            
            sortHand(pHand); phase = 'p_att'; updateState("Ваш ход! Выберите карту для атаки.");
        }

        function sortHand(h) { h.sort((a,b) => (a.s===trump.s ? a.v+100 : a.v) - (b.s===trump.s ? b.v+100 : b.v)); }
        
        function canBeat(defCard, attCard) {
            if(defCard.s === attCard.s && defCard.v > attCard.v) return true;
            if(defCard.s === trump.s && attCard.s !== trump.s) return true;
            return false;
        }

        function drawCards() {
            let pFirst = isPTurn;
            while(pFirst && pHand.length<6 && deck.length>0) pHand.push(deck.pop());
            while(bHand.length<6 && deck.length>0) bHand.push(deck.pop());
            while(!pFirst && pHand.length<6 && deck.length>0) pHand.push(deck.pop());
            sortHand(pHand); sortHand(bHand);
        }

        function playCard(idx) {
            let c = pHand[idx];
            if(phase === 'p_att') {
                tAtt = pHand.splice(idx, 1)[0]; phase = 'b_def'; updateState("Бот думает...");
                setTimeout(botDefend, 800);
            } else if(phase === 'p_def') {
                if(!canBeat(c, tAtt)) { alert("Эта карта не бьет!"); return; }
                tDef = pHand.splice(idx, 1)[0]; updateState("Вы отбились!"); phase = 'idle';
                setTimeout(() => { tAtt = null; tDef = null; drawCards(); isPTurn = true; phase = 'p_att'; updateState("Ваш ход!"); }, 1000);
            }
        }

        function playerTake() {
            pHand.push(tAtt); if(tDef) pHand.push(tDef);
            tAtt = null; tDef = null; drawCards(); isPTurn = false; phase = 'b_att';
            updateState("Вы взяли. Ход бота..."); setTimeout(botAttack, 1000);
        }

        function botDefend() {
            let valid = bHand.filter(c => canBeat(c, tAtt)).sort((a,b) => (a.s===trump.s?a.v+100:a.v) - (b.s===trump.s?b.v+100:b.v));
            if(valid.length > 0) {
                tDef = bHand.splice(bHand.indexOf(valid[0]), 1)[0]; updateState("Бот отбился.");
                setTimeout(() => { tAtt = null; tDef = null; drawCards(); isPTurn = false; phase = 'b_att'; updateState("Ход бота..."); setTimeout(botAttack, 1000); }, 1000);
            } else {
                bHand.push(tAtt); tAtt = null; drawCards(); isPTurn = true; phase = 'p_att'; updateState("Бот взял карты. Ваш ход!");
            }
        }

        function botAttack() {
            if(bHand.length === 0) return checkWin();
            sortHand(bHand); tAtt = bHand.shift(); phase = 'p_def'; updateState("Бот атаковал! Отбивайтесь или берите.");
        }

        function checkWin() {
            if(deck.length === 0) {
                if(pHand.length === 0 && bHand.length === 0) { updateBal(curBet); alert("Ничья!"); endCards(); }
                else if(pHand.length === 0) { updateBal(curBet*2); alert("Вы победили! Банк ваш."); endCards(); }
                else if(bHand.length === 0) { alert("Бот победил! Вы проиграли ставку."); endCards(); }
            }
        }
    </script>
</body>
</html>
